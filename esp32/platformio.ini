[env:t-can485]
platform  = espressif32
board     = esp32dev
framework = arduino

; Vitesse moniteur série
monitor_speed = 115200

; Pins upload (USB natif T-CAN485)
upload_speed = 921600

; Partition scheme avec plus d'espace app
board_build.partitions = min_spiffs.csv

lib_deps =
    fastled/FastLED @ ^3.6.0

build_flags =
    -DCORE_DEBUG_LEVEL=0
